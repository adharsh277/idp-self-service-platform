apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-service
  title: Create Service
  description: Create a new GitHub repository from a starter template
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Repository Details
      required:
        - name
        - owner
      properties:
        name:
          title: Repository Name
          type: string
          description: Name of the GitHub repository to create
        owner:
          title: GitHub Owner
          type: string
          default: adharsh277
          description: GitHub username or organization that will own the repository

  steps:
    - id: fetch-base
      name: Fetch Base Template
      action: fetch:template
      input:
        url: ./template
        values:
          name: ${{ parameters.name }}

    - id: publish
      name: Create GitHub Repo
      action: publish:github
      input:
        repoUrl: github.com?owner=${{ parameters.owner }}&repo=${{ parameters.name }}
        defaultBranch: main
        description: Created via Backstage

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}